name: Update Data and Deploy

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  push:
    branches: [ "main" ] # Runs every time you push code
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10' 
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f ./data_extractor/requirements.txt ]; then pip install -r ./data_extractor/requirements.txt; fi

      - name: Run Extraction Script
        run: 
          cd data_extractor
          python extractor.py

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ui_deupraia/package-lock.json

      - name: Install JS dependencies and Build
        run: |
          cd ui_deupraia
          npm install
          npm run build

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './ui_deupraia/dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4